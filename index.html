<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnePaper | Employee Onboarding Portal</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Configure Babel to use Classic JSX Runtime to prevent import errors -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { "runtime": "classic" }]
            ]
        });
    </script>

    <!-- Load Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        paper: { light: '#fdfbf7', DEFAULT: '#f5efe6', dark: '#eaddc9' },
                        indigo: { DEFAULT: '#1c1a17', light: '#4a453e' },
                        gold: { DEFAULT: '#c6a87c', light: '#dcc6a3', dark: '#a88b5d' },
                        ink: { DEFAULT: '#1c1a17', light: '#4a453e' }
                    },
                    animation: {
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'pulse-soft': 'pulseSoft 2s infinite',
                        'blob': 'blob 10s infinite'
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        pulseSoft: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.7' }
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #fdfbf7; color: #1c1a17; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #dcc6a3; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #c6a87c; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; overflow: hidden; background-color: #fdfbf7; }
        .paper-texture { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.35; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        .ambient-blob-1 { position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(198,168,124,0.15) 0%, rgba(253,251,247,0) 70%); border-radius: 50%; filter: blur(60px); animation: blob 15s infinite alternate; }
        .ambient-blob-2 { position: absolute; bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(234,221,201,0.4) 0%, rgba(253,251,247,0) 70%); border-radius: 50%; filter: blur(80px); animation: blob 20s infinite alternate-reverse; }
        .glass-card { background: rgba(253, 251, 247, 0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 30px 60px -15px rgba(28, 26, 23, 0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body class="min-h-screen">
    <div class="ambient-bg">
        <div class="ambient-blob-1"></div>
        <div class="ambient-blob-2"></div>
    </div>
    <div class="paper-texture"></div>

    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useRef, useEffect } = React;

        const PremiumInput = ({ label, icon, error, required, type = "text", ...props }) => {
            return (
                <div className={`relative w-full transition-transform duration-300 ${error ? 'animate-shake' : ''} mb-6`}>
                    <label className="block text-[13px] font-semibold text-ink mb-1.5 ml-1 flex items-center">
                        {label} {required && <span className="text-red-500 ml-1">*</span>}
                    </label>
                    <div className="relative group">
                        <div className={`absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors duration-300 ${error ? 'text-red-500' : 'text-ink-light group-focus-within:text-gold-dark'}`}>
                            <i className={`ph ${icon} text-lg`}></i>
                        </div>
                        {type === 'textarea' ? (
                            <textarea 
                                className={`w-full pl-11 pr-4 py-3 rounded-xl border outline-none transition-all duration-300 bg-white/60 backdrop-blur-md
                                ${error ? 'border-red-400 focus:border-red-500 shadow-[0_0_15px_rgba(248,113,113,0.15)] bg-red-50/50' : 'border-paper-dark/60 focus:border-gold hover:border-gold-light focus:bg-white shadow-sm focus:shadow-md'}`}
                                {...props}
                            />
                        ) : (
                            <input 
                                type={type}
                                className={`w-full pl-11 pr-4 py-3 rounded-xl border outline-none transition-all duration-300 bg-white/60 backdrop-blur-md
                                ${error ? 'border-red-400 focus:border-red-500 shadow-[0_0_15px_rgba(248,113,113,0.15)] bg-red-50/50' : 'border-paper-dark/60 focus:border-gold hover:border-gold-light focus:bg-white shadow-sm focus:shadow-md'}`}
                                {...props}
                            />
                        )}
                    </div>
                    <div className={`absolute -bottom-5 left-1 text-[11px] font-medium text-red-500 transition-all duration-300 ${error ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-2 pointer-events-none'}`}>
                        {error}
                    </div>
                </div>
            );
        };

        const PremiumFileDrop = ({ label, description, fieldName, allowedType, fileData, fileName, onChange, error }) => {
            const isUploaded = !!fileData;
            
            return (
                <div className={`mb-6 transition-transform duration-300 ${error ? 'animate-shake' : ''}`}>
                    <label className="block text-[13px] font-semibold text-ink mb-1.5 ml-1">
                        {label} <span className="text-red-500">*</span>
                    </label>
                    <p className="text-xs text-indigo-light mb-3 ml-1">{description}</p>
                    
                    <label className={`relative flex flex-col items-center justify-center w-full p-6 border-2 border-dashed rounded-xl cursor-pointer transition-all duration-300 overflow-hidden
                        ${error ? 'border-red-400 bg-red-50/50' : isUploaded ? 'border-green-400 bg-green-50/70' : 'border-gold/60 hover:border-gold hover:bg-white/80 bg-white/50 backdrop-blur-md'}`}>
                        
                        {isUploaded && <div className="absolute inset-0 bg-green-100/20 animate-pulse-soft"></div>}

                        <div className="relative z-10 flex flex-col items-center justify-center space-y-2 text-center">
                            {isUploaded ? (
                                <>
                                    <div className="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mb-2 shadow-sm">
                                        <i className="ph-fill ph-check-circle text-2xl text-green-600"></i>
                                    </div>
                                    <p className="text-sm font-semibold text-green-700 truncate max-w-xs">{fileName}</p>
                                    <p className="text-[10px] text-green-600 font-medium uppercase tracking-wider">Click to replace file</p>
                                </>
                            ) : (
                                <>
                                    <div className="w-12 h-12 bg-paper rounded-full flex items-center justify-center mb-2 group-hover:scale-110 transition-transform duration-300 shadow-sm border border-paper-dark">
                                        <i className={`ph ph-upload-simple text-xl ${error ? 'text-red-400' : 'text-gold-dark'}`}></i>
                                    </div>
                                    <p className={`text-sm font-medium ${error ? 'text-red-500' : 'text-ink'}`}>
                                        Click or drag to upload
                                    </p>
                                    <p className="text-xs text-indigo-light">
                                        {allowedType === 'pdf' ? 'PDF format only (Max 5MB)' : 'JPG/PNG only (Max 5MB)'}
                                    </p>
                                </>
                            )}
                        </div>
                        <input 
                            type="file" 
                            className="hidden" 
                            accept={allowedType === 'pdf' ? '.pdf' : 'image/*'} 
                            onChange={(e) => onChange(e, fieldName, allowedType)} 
                        />
                    </label>
                    <div className={`text-[11px] font-medium text-red-500 mt-1 ml-1 transition-all duration-300 ${error ? 'opacity-100' : 'opacity-0'}`}>
                        {error}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('guidelines'); 
            const [currentStep, setCurrentStep] = useState(1);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [errors, setErrors] = useState({});

            const [formData, setFormData] = useState({
                fullName: '', email: '', mobile: '', whatsapp: '', dob: '', doj: '',
                address: '', college: '', emergencyName: '', emergencyRelation: '', emergencyNumber: '',
                panNumber: '', aadhaarNumber: '', declaration: false
            });

            const [fileData, setFileData] = useState({
                aadhaarFile: null, panFile: null, eduFile: null, letterFile: null, photoFile: null
            });
            
            const [fileNames, setFileNames] = useState({
                aadhaarFile: '', panFile: '', eduFile: '', letterFile: '', photoFile: ''
            });

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
                if (errors[name]) setErrors(prev => ({ ...prev, [name]: null }));
            };

            const handleFileUpload = (e, fieldName, allowedType) => {
                const file = e.target.files[0];
                if (!file) return;

                if (allowedType === 'pdf' && file.type !== 'application/pdf') {
                    setErrors(prev => ({ ...prev, [fieldName]: 'Please upload a PDF file only.' }));
                    e.target.value = ''; return;
                }
                if (allowedType === 'image' && !file.type.startsWith('image/')) {
                    setErrors(prev => ({ ...prev, [fieldName]: 'Please upload an image file (JPG/PNG) only.' }));
                    e.target.value = ''; return;
                }
                if (file.size > 5 * 1024 * 1024) {
                    setErrors(prev => ({ ...prev, [fieldName]: 'File size must be less than 5MB.' }));
                    e.target.value = ''; return;
                }

                setErrors(prev => ({ ...prev, [fieldName]: null }));
                setFileNames(prev => ({ ...prev, [fieldName]: file.name }));

                const reader = new FileReader();
                reader.onload = () => { setFileData(prev => ({ ...prev, [fieldName]: reader.result })); };
                reader.readAsDataURL(file);
            };

            const validateStep1 = () => {
                const newErrors = {};
                const reqText = "This field is required";
                
                if (!formData.fullName.trim()) newErrors.fullName = reqText;
                if (!formData.email.trim() || !/^\S+@\S+\.\S+$/.test(formData.email)) newErrors.email = "Valid email is required";
                if (!formData.dob) newErrors.dob = reqText;
                if (!formData.doj) newErrors.doj = reqText;
                
                const phoneRegex = /^[0-9+\s-]{10,15}$/;
                if (!formData.mobile || !phoneRegex.test(formData.mobile)) newErrors.mobile = "Valid mobile number is required";
                if (!formData.whatsapp || !phoneRegex.test(formData.whatsapp)) newErrors.whatsapp = "Valid WhatsApp number is required";
                
                if (!formData.address.trim()) newErrors.address = reqText;
                if (!formData.college.trim()) newErrors.college = reqText;
                if (!formData.emergencyName.trim()) newErrors.emergencyName = reqText;
                if (!formData.emergencyRelation) newErrors.emergencyRelation = "Please select a relationship";
                if (!formData.emergencyNumber || !phoneRegex.test(formData.emergencyNumber)) newErrors.emergencyNumber = "Valid contact number required";

                setErrors(newErrors);
                
                if(Object.keys(newErrors).length > 0) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    return false;
                }
                return true;
            };

            const validateStep2 = () => {
                const newErrors = {};
                const reqText = "This document is required";

                if (!formData.panNumber.trim()) newErrors.panNumber = "PAN Number is required";
                if (!fileData.panFile) newErrors.panFile = reqText;

                if (!formData.aadhaarNumber.trim()) newErrors.aadhaarNumber = "Aadhaar Number is required";
                if (!fileData.aadhaarFile) newErrors.aadhaarFile = reqText;

                if (!fileData.eduFile) newErrors.eduFile = reqText;
                if (!fileData.letterFile) newErrors.letterFile = reqText;
                if (!fileData.photoFile) newErrors.photoFile = reqText;

                if (!formData.declaration) newErrors.declaration = "You must accept the declaration to proceed";

                setErrors(newErrors);
                if(Object.keys(newErrors).length > 0) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    return false;
                }
                return true;
            };

            const proceedToNextStep = () => {
                if (validateStep1()) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setCurrentStep(2);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if(!validateStep2()) return;

                setIsSubmitting(true);
                // Clear any previous submit errors
                setErrors(prev => ({...prev, submit: null}));

                const scriptURL = 'https://script.google.com/macros/s/AKfycbyOJQXchB3MeoMWp5zbHYNGlBvL2Xgs5ofLmYVeXdQGqXFxJMETVCK9PLgzx3IPHIapyQ/exec'; 
                
                const payload = { 
                    ...formData, 
                    ...fileData,
                    fileNames: fileNames 
                };

                try {
                    // FIX: Removed mode: 'no-cors' so we can actually catch backend errors.
                    // Google Apps Script will accept this since Content-Type is text/plain.
                    const response = await fetch(scriptURL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: { "Content-Type": "text/plain;charset=utf-8" }
                    });

                    // If GAS completely fails (e.g. payload too large)
                    if (!response.ok) {
                        throw new Error("Server rejected the request. Payload size might be too large.");
                    }
                    
                    // Parse the JSON response from Google Apps Script
                    let result;
                    try {
                        result = await response.json();
                    } catch(err) {
                        throw new Error("Backend did not return valid JSON. Check your Google Apps Script code.");
                    }

                    // If the Apps Script explicitly returned an error status
                    if (result.status === "error") {
                        throw new Error(result.message || "Unknown backend error");
                    }
                    
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setView('success');
                } catch (error) {
                    console.error('Submission Error:', error.message);
                    setErrors({ submit: "Submission Failed: " + error.message });
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleImageError = (e) => {
                e.target.src = "https://placehold.co/240x80/f5efe6/1c1a17?text=OnePaper";
            };

            if (view === 'guidelines') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 py-12 animate-fade-in">
                        <div className="glass-card rounded-2xl w-full max-w-4xl p-8 md:p-14 animate-slide-up relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-gold opacity-10 rounded-bl-full pointer-events-none"></div>

                            <div className="text-center mb-12 relative z-10 flex flex-col items-center">
                                <img 
                                    src="https://lh3.googleusercontent.com/d/1-__uf4WcUk8Dedhh9oiXoHv2IudkmLAp" 
                                    onError={handleImageError}
                                    alt="OnePaper Logo" 
                                    className="h-20 md:h-24 object-contain mb-4 drop-shadow-md" 
                                />
                                <p className="text-[11px] tracking-[0.25em] text-ink-light uppercase font-bold">
                                    Research Analysts Pvt. Ltd.
                                </p>
                            </div>

                            <div className="text-center mb-10">
                                <h2 className="text-2xl font-bold text-ink">Welcome to the Team!</h2>
                                <p className="text-ink-light mt-2 max-w-lg mx-auto">Please complete the following documentation process carefully to finalize your onboarding. This ensures a smooth start to your journey with us.</p>
                            </div>

                            <div className="space-y-6">
                                <div className="grid md:grid-cols-2 gap-6">
                                    <div className="bg-white/60 p-6 rounded-xl border border-paper-dark hover:shadow-md transition-shadow duration-300">
                                        <div className="flex items-center mb-4">
                                            <div className="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center mr-3">
                                                <i className="ph-fill ph-warning-circle text-xl"></i>
                                            </div>
                                            <h3 className="font-bold text-ink text-lg">Strict Guidelines</h3>
                                        </div>
                                        <ul className="space-y-3 text-sm text-ink-light">
                                            <li className="flex items-center"><i className="ph-bold ph-check text-green-500 mr-2"></i> Documents must be Clear & Legible</li>
                                            <li className="flex items-center"><i className="ph-bold ph-check text-green-500 mr-2"></i> Must be <strong>Self-Attested</strong> (Signed + Dated)</li>
                                            <li className="flex items-center"><i className="ph-bold ph-check text-green-500 mr-2"></i> Uploaded in Color (No Black and White)</li>
                                            <li className="flex items-center"><i className="ph-bold ph-check text-green-500 mr-2"></i> Uploaded strictly in <strong>PDF Format</strong></li>
                                        </ul>
                                    </div>

                                    <div className="bg-white/60 p-6 rounded-xl border border-paper-dark hover:shadow-md transition-shadow duration-300">
                                        <div className="flex items-center mb-4">
                                            <div className="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center mr-3">
                                                <i className="ph-fill ph-file-pdf text-xl"></i>
                                            </div>
                                            <h3 className="font-bold text-ink text-lg">File Naming Format</h3>
                                        </div>
                                        <p className="text-sm text-indigo-light mb-4">Files must be renamed before uploading to ensure proper routing:</p>
                                        <div className="bg-paper p-3 rounded-lg border border-paper-dark font-mono text-xs text-ink font-semibold flex items-center shadow-inner">
                                            <i className="ph ph-terminal-window mr-2 text-indigo-light"></i>
                                            FullName_DocumentType.pdf
                                        </div>
                                        <div className="mt-3 text-[11px] text-ink-light italic">
                                            E.g. Rahul_Sharma_PAN.pdf
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-10 flex justify-center">
                                    <button 
                                        onClick={() => {
                                            window.scrollTo({ top: 0, behavior: 'smooth' });
                                            setView('form');
                                        }}
                                        className="relative z-10 bg-ink hover:bg-ink-light text-white px-10 py-4 rounded-xl font-bold transition-all duration-300 shadow-xl hover:-translate-y-0.5 flex items-center w-full md:w-auto justify-center group"
                                    >
                                        Acknowledge & Start
                                        <i className="ph-bold ph-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'success') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 animate-fade-in">
                        <div className="glass-card rounded-2xl p-10 max-w-lg text-center animate-slide-up shadow-2xl border-green-100 relative overflow-hidden">
                            <div className="absolute inset-0 bg-gradient-to-b from-green-50/50 to-transparent pointer-events-none"></div>

                            <div className="relative z-10">
                                <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg border border-green-100">
                                    <i className="ph-fill ph-check-circle text-6xl text-green-500 animate-[pulse_2s_ease-in-out_infinite]"></i>
                                </div>
                                <h2 className="text-3xl font-bold text-ink mb-3">Submission Complete</h2>
                                <p className="text-ink-light mb-8 text-sm leading-relaxed">
                                    Your secure onboarding profile has been created. A confirmation email has been dispatched to your inbox.
                                </p>

                                <div className="bg-white p-6 rounded-xl border border-paper-dark shadow-sm mb-8 text-left">
                                    <div className="flex items-center mb-3">
                                        <div className="w-8 h-8 rounded bg-gold/20 flex items-center justify-center mr-3 text-gold-dark">
                                            <i className="ph-fill ph-bell-ringing"></i>
                                        </div>
                                        <h3 className="font-bold text-ink">Final Required Action</h3>
                                    </div>
                                    <p className="text-[13px] text-ink-light mb-5">
                                        Please notify the HR department via WhatsApp to trigger the review process of your submitted documents.
                                    </p>
                                    
                                    <a 
                                        href={`https://wa.me/918086981567?text=Hi%20HR%20Team%2C%20I%20have%20successfully%20submitted%20my%20onboarding%20documents.%20Name:%20${formData.fullName}`} 
                                        target="_blank"
                                        className="group relative flex items-center justify-center w-full bg-[#25D366] hover:bg-[#1DA851] text-white px-6 py-4 rounded-xl font-bold transition-all duration-300 shadow-[0_4px_14px_0_rgba(37,211,102,0.39)] hover:shadow-[0_6px_20px_rgba(37,211,102,0.23)] hover:-translate-y-0.5 overflow-hidden"
                                    >
                                        <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                                        <i className="ph-fill ph-whatsapp text-2xl mr-2 relative z-10 group-hover:scale-110 transition-transform duration-300"></i>
                                        <span className="relative z-10 text-[15px]">Notify HR on WhatsApp</span>
                                    </a>
                                </div>

                                <p className="text-xs font-semibold text-ink-light uppercase tracking-wider">Welcome to OnePaper</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto py-10 px-4 sm:px-6 lg:px-8 relative z-10 animate-fade-in">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 bg-white/60 backdrop-blur-md p-6 rounded-2xl border border-paper-dark shadow-sm">
                        <div className="flex items-center mb-4 md:mb-0">
                            <img 
                                src="https://lh3.googleusercontent.com/d/1-__uf4WcUk8Dedhh9oiXoHv2IudkmLAp" 
                                onError={handleImageError}
                                alt="OnePaper Logo" 
                                className="h-10 md:h-12 object-contain mr-4" 
                            />
                            <div className="h-8 w-px bg-paper-dark hidden md:block"></div>
                            <p className="text-[11px] tracking-[0.2em] text-ink-light uppercase font-bold ml-4 hidden md:block mt-1">
                                Employee Onboarding
                            </p>
                        </div>
                        
                        <div className="flex items-center space-x-3 bg-paper p-2 rounded-xl border border-paper-dark">
                            <div className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all duration-300 ${currentStep === 1 ? 'bg-white shadow-sm text-ink' : 'text-ink-light'}`}>
                                1. Details
                            </div>
                            <i className="ph-bold ph-caret-right text-ink-light text-[10px]"></i>
                            <div className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all duration-300 ${currentStep === 2 ? 'bg-white shadow-sm text-ink' : 'text-ink-light'}`}>
                                2. Documents
                            </div>
                        </div>
                    </header>

                    <div className="glass-card rounded-2xl p-6 sm:p-12 min-h-[600px] relative">
                        {errors.submit && (
                            <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-red-100 text-red-700 px-6 py-3 rounded-lg shadow-md border border-red-200 flex items-center z-50 animate-slide-up w-max max-w-full">
                                <i className="ph-fill ph-warning-octagon mr-2 text-xl"></i>
                                <span className="text-sm font-semibold">{errors.submit}</span>
                            </div>
                        )}

                        <form onSubmit={handleSubmit} noValidate>
                            {/* STEP 1: Personal Details */}
                            <div className={`transition-all duration-500 ease-in-out ${currentStep === 1 ? 'opacity-100 translate-x-0' : 'opacity-0 absolute -translate-x-full pointer-events-none'}`}>
                                <div className="mb-8 border-b border-paper-dark pb-6">
                                    <h2 className="text-2xl font-bold text-ink flex items-center">
                                        <i className="ph-duotone ph-identification-card text-gold-dark mr-3 text-3xl"></i>
                                        Personal & Emergency Details
                                    </h2>
                                    <p className="text-sm text-ink-light mt-1 ml-11">Information must exactly match your government-issued ID.</p>
                                </div>

                                <div className="grid md:grid-cols-2 gap-x-8 gap-y-2">
                                    <div className="md:col-span-2">
                                        <PremiumInput label="Full Legal Name" name="fullName" icon="ph-user" placeholder="Rahul Kumar Sharma" value={formData.fullName} onChange={handleInputChange} error={errors.fullName} required />
                                    </div>
                                    <PremiumInput label="Personal Email Address" type="email" name="email" icon="ph-envelope-simple" placeholder="rahul@example.com" value={formData.email} onChange={handleInputChange} error={errors.email} required />
                                    <PremiumInput label="Date of Birth" type="date" name="dob" icon="ph-calendar-blank" value={formData.dob} onChange={handleInputChange} error={errors.dob} required />
                                    <PremiumInput label="Mobile Number" type="tel" name="mobile" icon="ph-phone" placeholder="+91 9876543210" value={formData.mobile} onChange={handleInputChange} error={errors.mobile} required />
                                    <PremiumInput label="WhatsApp Number" type="tel" name="whatsapp" icon="ph-whatsapp-logo" placeholder="+91 9876543210" value={formData.whatsapp} onChange={handleInputChange} error={errors.whatsapp} required />
                                    <div className="md:col-span-2">
                                         <PremiumInput label="Date of Joining" type="date" name="doj" icon="ph-calendar-plus" value={formData.doj} onChange={handleInputChange} error={errors.doj} required />
                                    </div>
                                    <div className="md:col-span-2">
                                        <PremiumInput label="Home Address" type="textarea" name="address" icon="ph-map-pin" rows="3" placeholder="House/Flat No, Landmark, PIN Code" value={formData.address} onChange={handleInputChange} error={errors.address} required />
                                    </div>
                                    <div className="md:col-span-2">
                                        <PremiumInput label="College / University Name" name="college" icon="ph-graduation-cap" placeholder="e.g., University of Delhi" value={formData.college} onChange={handleInputChange} error={errors.college} required />
                                    </div>
                                </div>

                                <div className="mt-8 pt-8 border-t border-paper-dark">
                                    <h3 className="text-lg font-bold text-ink mb-6 flex items-center">
                                        <i className="ph-duotone ph-heartbeat text-red-400 mr-2 text-2xl"></i> Emergency Contact
                                    </h3>
                                    <div className="grid md:grid-cols-2 gap-x-8 gap-y-2">
                                        <div className="md:col-span-2">
                                            <PremiumInput label="Emergency Contact Full Name" name="emergencyName" icon="ph-user-focus" value={formData.emergencyName} onChange={handleInputChange} error={errors.emergencyName} required />
                                        </div>
                                        
                                        <div className={`relative mb-6 w-full transition-transform duration-300 ${errors.emergencyRelation ? 'animate-shake' : ''}`}>
                                            <label className="block text-[13px] font-semibold text-ink mb-1.5 ml-1">Relationship <span className="text-red-500">*</span></label>
                                            <div className="relative group">
                                                <div className={`absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors duration-300 ${errors.emergencyRelation ? 'text-red-500' : 'text-ink-light group-focus-within:text-gold-dark'}`}>
                                                    <i className="ph ph-users text-lg"></i>
                                                </div>
                                                <select 
                                                    name="emergencyRelation" value={formData.emergencyRelation} onChange={handleInputChange}
                                                    className={`w-full pl-11 pr-10 py-3 rounded-xl border outline-none transition-all duration-300 bg-white/60 backdrop-blur-md appearance-none
                                                    ${errors.emergencyRelation ? 'border-red-400 focus:border-red-500 bg-red-50/50 shadow-[0_0_15px_rgba(248,113,113,0.15)]' : 'border-paper-dark/60 focus:border-gold hover:border-gold-light focus:bg-white shadow-sm focus:shadow-md'}`}
                                                >
                                                    <option value="" disabled hidden>Select Relationship</option>
                                                    <option value="Father">Father</option>
                                                    <option value="Mother">Mother</option>
                                                    <option value="Spouse">Spouse</option>
                                                </select>
                                                <div className="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-ink-light">
                                                    <i className="ph-bold ph-caret-down"></i>
                                                </div>
                                            </div>
                                            {errors.emergencyRelation && <div className="absolute -bottom-5 left-1 text-[11px] font-medium text-red-500">{errors.emergencyRelation}</div>}
                                        </div>

                                        <PremiumInput label="Emergency Contact Number" type="tel" name="emergencyNumber" icon="ph-phone-call" value={formData.emergencyNumber} onChange={handleInputChange} error={errors.emergencyNumber} required />
                                    </div>
                                </div>

                                <div className="mt-10 flex justify-end">
                                    <button type="button" onClick={proceedToNextStep} className="bg-gradient-to-r from-ink to-ink-light text-white px-10 py-3.5 rounded-xl font-bold transition-all duration-300 shadow-xl hover:shadow-2xl hover:shadow-ink/20 border border-ink-light/50 hover:-translate-y-0.5 flex items-center group">
                                        Next: Document Uploads
                                        <i className="ph-bold ph-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                                    </button>
                                </div>
                            </div>

                            {/* STEP 2: Document Uploads */}
                            <div className={`transition-all duration-500 ease-in-out ${currentStep === 2 ? 'opacity-100 translate-x-0' : 'opacity-0 absolute translate-x-full pointer-events-none hidden'}`}>
                                <div className="mb-8 border-b border-paper-dark pb-6 flex justify-between items-end">
                                    <div>
                                        <h2 className="text-2xl font-bold text-ink flex items-center">
                                            <i className="ph-duotone ph-folder-open text-gold-dark mr-3 text-3xl"></i>
                                            Secure Document Uploads
                                        </h2>
                                        <p className="text-sm text-ink-light mt-1 ml-11">All documents must be self-attested PDFs.</p>
                                    </div>
                                    <button type="button" onClick={() => setCurrentStep(1)} className="text-sm font-semibold text-ink-light hover:text-ink transition-colors flex items-center bg-paper hover:bg-paper-dark px-4 py-2 rounded-lg">
                                        <i className="ph-bold ph-arrow-left mr-2"></i> Edit Details
                                    </button>
                                </div>

                                <div className="grid md:grid-cols-2 gap-x-8 gap-y-4">
                                    <div className="bg-white/40 p-5 rounded-2xl border border-paper-dark/50">
                                        <PremiumInput label="PAN Number" name="panNumber" icon="ph-credit-card" placeholder="10-digit PAN Number" value={formData.panNumber} onChange={(e)=>{e.target.value = e.target.value.toUpperCase(); handleInputChange(e);}} error={errors.panNumber} required />
                                        <PremiumFileDrop label="PAN Card Document (Self Attested)" description="Upload a signed copy of your PAN." fieldName="panFile" allowedType="pdf" fileData={fileData.panFile} fileName={fileNames.panFile} onChange={handleFileUpload} error={errors.panFile} />
                                    </div>

                                    <div className="bg-white/40 p-5 rounded-2xl border border-paper-dark/50">
                                        <PremiumInput label="Aadhaar Number" name="aadhaarNumber" icon="ph-fingerprint" placeholder="12-digit Aadhaar Number" value={formData.aadhaarNumber} onChange={handleInputChange} error={errors.aadhaarNumber} required />
                                        <PremiumFileDrop 
                                            label="E-Aadhaar Document (Self Attested)" 
                                            description={
                                                <span className="block mt-1">
                                                    Download E-Aadhaar, print, sign, and upload. 
                                                    <a href="https://myaadhaar.uidai.gov.in/genricDownloadAadhaar" target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:text-blue-800 font-semibold underline inline-flex items-center ml-1">
                                                        <i className="ph ph-arrow-square-out mr-1"></i> UIDAI Portal
                                                    </a>
                                                </span>
                                            } 
                                            fieldName="aadhaarFile" 
                                            allowedType="pdf" 
                                            fileData={fileData.aadhaarFile} 
                                            fileName={fileNames.aadhaarFile} 
                                            onChange={handleFileUpload} 
                                            error={errors.aadhaarFile} 
                                        />
                                    </div>

                                    <div className="bg-white/40 p-5 rounded-2xl border border-paper-dark/50 md:col-span-2">
                                        <PremiumFileDrop label="Merged Education Certificates" description="Merge 10th, 12th, and latest graduation into a single self-attested PDF." fieldName="eduFile" allowedType="pdf" fileData={fileData.eduFile} fileName={fileNames.eduFile} onChange={handleFileUpload} error={errors.eduFile} />
                                    </div>

                                    <div className="bg-white/40 p-5 rounded-2xl border border-paper-dark/50">
                                        <PremiumFileDrop label="Letter of Intent Acceptance" description="Upload signed LOI in PDF format." fieldName="letterFile" allowedType="pdf" fileData={fileData.letterFile} fileName={fileNames.letterFile} onChange={handleFileUpload} error={errors.letterFile} />
                                    </div>

                                    <div className="bg-white/40 p-5 rounded-2xl border border-paper-dark/50">
                                        <PremiumFileDrop label="Passport Size Photo (ID Card)" description="Clear, recent photo in Image format (JPG/PNG)." fieldName="photoFile" allowedType="image" fileData={fileData.photoFile} fileName={fileNames.photoFile} onChange={handleFileUpload} error={errors.photoFile} />
                                    </div>
                                </div>

                                <div className={`mt-10 relative bg-gradient-to-br from-paper to-paper-light p-8 rounded-2xl border-2 transition-all duration-300 shadow-sm ${errors.declaration ? 'border-red-400 bg-red-50 animate-shake' : 'border-paper-dark'}`}>
                                    {errors.declaration && (
                                        <div className="absolute -top-3 left-6 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-md">
                                            Signature Required
                                        </div>
                                    )}

                                    <div className="flex items-start">
                                        <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm border border-paper-dark mr-4 shrink-0 mt-1">
                                            <i className="ph-duotone ph-seal-check text-2xl text-gold-dark"></i>
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-ink mb-2">Employee Declaration</h3>
                                            <p className="text-[13px] text-ink-light mb-5 leading-relaxed bg-white/50 p-4 rounded-xl border border-paper-dark/30">
                                                "I hereby declare that all documents uploaded by me are submitted solely for documentation purposes to OnePaper Research Analysts. I confirm that the information and documents provided are true and correct, and I authorize the company to use them for official and verification purposes."
                                            </p>
                                            
                                            <label className="flex items-center cursor-pointer group w-fit">
                                                <div className="relative flex items-center">
                                                    <input type="checkbox" name="declaration" checked={formData.declaration} onChange={handleInputChange} className="sr-only" />
                                                    <div className={`w-6 h-6 border-2 rounded-md flex items-center justify-center transition-all duration-300 
                                                        ${formData.declaration ? 'bg-ink border-ink' : errors.declaration ? 'border-red-400 bg-red-50' : 'border-ink-light group-hover:border-ink bg-white'}`}>
                                                        <i className={`ph-bold ph-check text-white text-sm transition-opacity duration-200 ${formData.declaration ? 'opacity-100' : 'opacity-0'}`}></i>
                                                    </div>
                                                </div>
                                                <span className={`ml-3 text-sm font-bold select-none transition-colors duration-300 ${formData.declaration ? 'text-ink' : errors.declaration ? 'text-red-500' : 'text-ink-light group-hover:text-ink'}`}>
                                                    I agree to the electronic declaration stated above. <span className="text-red-500">*</span>
                                                </span>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-10 flex justify-end border-t border-paper-dark pt-8">
                                    <button 
                                        type="submit" 
                                        disabled={isSubmitting}
                                        className={`relative overflow-hidden px-10 py-4 rounded-xl font-bold transition-all duration-300 shadow-xl flex items-center group border border-white/20
                                            ${isSubmitting 
                                                ? 'bg-paper-dark text-ink cursor-wait shadow-inner scale-95' 
                                                : 'bg-gradient-to-r from-[#a88b5d] to-[#c6a87c] text-white hover:shadow-2xl hover:shadow-gold/30 hover:-translate-y-0.5'}`}
                                    >
                                        {isSubmitting ? (
                                            <>
                                                <i className="ph-bold ph-spinner animate-spin mr-3 text-xl"></i> 
                                                Encrypting & Submitting...
                                            </>
                                        ) : (
                                            <>
                                                <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                                                <span className="relative z-10 flex items-center">
                                                    <i className="ph-fill ph-paper-plane-tilt mr-3 text-xl group-hover:scale-110 transition-transform"></i> 
                                                    Finalize Submission
                                                </span>
                                            </>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
